<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  margin:0;
  padding:0;
}

.header{
  background:#0b3d91;
  color:white;
  text-align:center;
  padding:20px;
}

.header h1{
  margin:0;
  font-size:26px;
}

.header p{
  margin:5px 0 0 0;
  font-size:16px;
  opacity:0.9;
}

.container{
  max-width:700px;
  margin:40px auto;
  background:#fff;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  color:#27ae60;
}

p{
  font-size:16px;
  padding:6px 0;
  border-bottom:1px solid #eee;
}

.label{
  font-weight:bold;
}

.status{
  font-weight:bold;
  color:green;
  font-size:18px;
}
</style>
</head>

<body>

<!-- 🔵 HEADER ADDED -->
<div class="header">
  <h1>Lado Women Foundation</h1>
  <p>Internship Certificate Verification</p>
</div>

<div class="container">

  <h2 id="studentName">Loading...</h2>

  <p><span class="label">Internship ID:</span> <span id="internshipId"></span></p>
  <p><span class="label">Father Name:</span> <span id="fatherName"></span></p>
  <p><span class="label">College:</span> <span id="college"></span></p>
  <p><span class="label">Roll No:</span> <span id="rollNo"></span></p>
  <p><span class="label">Class:</span> <span id="className"></span></p>
  <p><span class="label">Semester:</span> <span id="semester"></span></p>
  <p><span class="label">Duration:</span> <span id="duration"></span></p>
  <p><span class="label">Certificate No:</span> <span id="certificateNo"></span></p>
  <p><span class="label">Issue Date:</span> <span id="issueDate"></span></p>
  <p><span class="label">Status:</span> <span id="status" class="status"></span></p>

</div>

<script>
const API_URL = "YOUR_API_URL_HERE";

fetch(API_URL)
.then(res => res.json())
.then(data => {

  document.getElementById("studentName").innerText = data.studentName || "Not Found";
  document.getElementById("internshipId").innerText = data.internshipId || "-";
  document.getElementById("fatherName").innerText = data.fatherName || "-";
  document.getElementById("college").innerText = data.college || "-";
  document.getElementById("rollNo").innerText = data.rollNo || "-";
  document.getElementById("className").innerText = data.class || "-";
  document.getElementById("semester").innerText = data.semester || "-";
  document.getElementById("duration").innerText = data.duration || "-";
  document.getElementById("certificateNo").innerText = data.certificateNo || "-";
  document.getElementById("issueDate").innerText = data.issueDate || "-";
  document.getElementById("status").innerText = data.status || "Invalid";

});
</script>

</body>
</html>
