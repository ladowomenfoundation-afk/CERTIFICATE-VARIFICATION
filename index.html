<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  margin:0;
}

.header{
  background:#0b3d91;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:600px;
  margin:40px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

.result{
  margin-top:20px;
  padding:15px;
  border-top:1px solid #ddd;
}

.label{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>Lado Women Foundation</h2>
  <p>Internship Certificate Verification</p>
</div>

<div class="container">

  <input type="text" id="internshipIdInput" placeholder="Enter Internship ID">
  <button onclick="verify()">Verify Certificate</button>

  <div class="result" id="result"></div>

</div>

<script>

const API_URL = "YOUR_API_URL_HERE";

function verify(){

  let id = document.getElementById("internshipIdInput").value;
  let resultDiv = document.getElementById("result");

  if(!id){
    resultDiv.innerHTML = "Please enter Internship ID";
    return;
  }

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    if(data.internshipId == id){

      resultDiv.innerHTML = `
        <h3 style="color:green;">Verified ✔️</h3>
        <p><b>Name:</b> ${data.studentName}</p>
        <p><b>Internship ID:</b> ${data.internshipId}</p>
        <p><b>College:</b> ${data.college}</p>
        <p><b>Certificate No:</b> ${data.certificateNo}</p>
        <p><b>Issue Date:</b> ${data.issueDate}</p>
        <p><b>Status:</b> ${data.status}</p>
      `;

    } else {
      resultDiv.innerHTML = "<h3 style='color:red;'>Invalid Certificate ❌</h3>";
    }

  })
  .catch(err => {
    resultDiv.innerHTML = "Error loading data";
  });

}

</script>

</body>
</html>
