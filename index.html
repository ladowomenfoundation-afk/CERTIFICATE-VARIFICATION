<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation - Verification</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

.header{
  background:#0b3d91;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  max-width:700px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

.result{
  margin-top:20px;
  padding:15px;
  border-top:1px solid #ddd;
}

.ok{
  color:green;
  font-weight:bold;
}

.bad{
  color:red;
  font-weight:bold;
}

.label{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>Lado Women Foundation</h2>
  <p>Internship Certificate Verification System</p>
</div>

<div class="container">

  <input type="text" id="searchInput" placeholder="Search by Name / Internship ID / Certificate ID">

  <button onclick="verifyData()">Verify Certificate</button>

  <div class="result" id="result"></div>

</div>

<script>

// 🔥 YOUR GOOGLE APPS SCRIPT API
const API_URL = "https://script.google.com/macros/s/AKfycbzi2xOyd7OXiAEx8ZFeRgdGuKp_cykUrj7n84pujLRgZiO7YdZbZ_StIB04Qn0ecjWvTQ/exec";

// ================= MAIN VERIFY FUNCTION =================
function verifyData(){

  let input = document.getElementById("searchInput").value.trim().toLowerCase();
  let result = document.getElementById("result");

  if(!input){
    result.innerHTML = "<span class='bad'>Please enter value</span>";
    return;
  }

  result.innerHTML = "Checking...";

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    // 🔥 SAFE ARRAY CHECK
    let list = Array.isArray(data) ? data : [data];

    // 🔍 SEARCH LOGIC (3 ways)
    let match = list.find(item => 
      (item.studentName || "").toLowerCase() === input ||
      (item.internshipId || "").toLowerCase() === input ||
      (item.certificateNo || "").toLowerCase() === input
    );

    if(match){

      result.innerHTML = `
        <h3 class="ok">✔️ Certificate Verified Successfully</h3>

        <p><span class="label">Name:</span> ${match.studentName || "-"}</p>
        <p><span class="label">Internship ID:</span> ${match.internshipId || "-"}</p>
        <p><span class="label">Father Name:</span> ${match.fatherName || "-"}</p>
        <p><span class="label">College:</span> ${match.college || "-"}</p>
        <p><span class="label">Roll No:</span> ${match.rollNo || "-"}</p>
        <p><span class="label">Class:</span> ${match.class || "-"}</p>
        <p><span class="label">Semester:</span> ${match.semester || "-"}</p>
        <p><span class="label">Duration:</span> ${match.duration || "-"}</p>
        <p><span class="label">Certificate No:</span> ${match.certificateNo || "-"}</p>
        <p><span class="label">Issue Date:</span> ${match.issueDate || "-"}</p>
        <p><span class="label">Status:</span> ${match.status || "-"}</p>

      `;

    } else {
      result.innerHTML = "<h3 class='bad'>❌ Record Not Found</h3>";
    }

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "<span class='bad'>Server Error / API Not Working</span>";
  });

}

</script>

</body>
</html>
