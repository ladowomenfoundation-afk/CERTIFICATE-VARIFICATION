<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificate Verification Portal</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:30px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

input{
width:90%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
padding:12px 25px;
background:green;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

#result{
margin-top:20px;
text-align:left;
}

.success{
color:green;
font-weight:bold;
}

.error{
color:red;
font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<h2>Lado Women Foundation</h2>
<h3>Certificate Verification System</h3>

<input type="text" id="search" placeholder="Enter Internship ID / Certificate No / Name">

<br>

<button onclick="verify()">Verify Certificate</button>

<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyCjE9AAdug8OHXLoYucXt5SrPc1Xl0gObtYlDBOqt_ySJAiXU34yc2Q-etjZiPnEK1/exec";

function verify(){

let search = document.getElementById("search").value;

if(!search){
document.getElementById("result").innerHTML = "<p class='error'>Please enter value</p>";
return;
}

document.getElementById("result").innerHTML = "Checking...";

fetch(API_URL + "?search=" + encodeURIComponent(search.trim()))
.then(res => res.json())
.then(data => {

if(data.status === "found"){

document.getElementById("result").innerHTML = `
<p class="success">✔️ Certificate Verified</p>

<p><b>Internship ID:</b> ${data.internshipId}</p>
<p><b>Name:</b> ${data.studentName}</p>
<p><b>Father Name:</b> ${data.fatherName}</p>
<p><b>College:</b> ${data.college}</p>
<p><b>Roll No:</b> ${data.rollNo}</p>
<p><b>Class:</b> ${data.studentClass}</p>
<p><b>Semester:</b> ${data.semester}</p>
<p><b>Duration:</b> ${data.duration}</p>
<p><b>Certificate No:</b> ${data.certificateNo}</p>
<p><b>Issue Date:</b> ${data.issueDate}</p>
<p><b>Status:</b> ${data.verifyStatus}</p>
`;

}else{

document.getElementById("result").innerHTML =
"<p class='error'>❌ Not Found</p>";

}

})
.catch(err => {
document.getElementById("result").innerHTML =
"<p class='error'>Error connecting to server</p>";
});

}

</script>

</body>
</html>
