<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation - Verification</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#f4f6f9;
}

.header{
  background:#0b3d91;
  color:white;
  text-align:center;
  padding:18px;
}

.header h2{
  margin:0;
}

.header p{
  margin:5px 0 0;
  font-size:14px;
}

.container{
  max-width:750px;
  margin:40px auto;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:15px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#27ae60;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#219150;
}

.result{
  margin-top:20px;
  padding:15px;
  border-top:1px solid #ddd;
}

.ok{
  color:green;
  font-weight:bold;
  font-size:18px;
}

.bad{
  color:red;
  font-weight:bold;
}

.label{
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
  <h2>Lado Women Foundation</h2>
  <p>Internship Certificate Verification System</p>
</div>

<div class="container">

  <input type="text" id="searchInput" placeholder="Search by Name / Internship ID / Certificate ID">

  <button onclick="verify()">Verify Certificate</button>

  <div class="result" id="result"></div>

</div>

<script>

function verify(){

    result.innerHTML = "<span class='bad'>Please enter value</span>";

    let list = [];

      list = data;
    }
    else if(data.records){
      list = data.records;
    }
    else{
      list = [data];
    }

      let cid = (item.certificateNo || "").toLowerCase().trim();

        input === iid ||

        name.includes(input) ||
        iid.includes(input) ||

        match = item;
        break;
      }
    }
