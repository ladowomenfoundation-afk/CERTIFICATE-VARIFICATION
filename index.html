<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lado Women Foundation Verification</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://images.unsplash.com/photo-1523240795612-9a054b0db644") no-repeat center center fixed;
background-size:cover;
}

.overlay{
background:rgba(0,0,0,0.65);
min-height:100vh;
padding:20px;
}

.container{
max-width:750px;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.logo{
width:90px;
margin-bottom:10px;
}

input{
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:10px 20px;
margin:5px;
background:green;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
text-align:left;
margin-top:15px;
}

.gallery{
margin-top:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
height:160px;
object-fit:cover;
border-radius:10px;
}

h2,h3{
margin:5px;
}

</style>

</head>

<body>

<div class="overlay">

<div class="container">

<!-- LOGO (replace FILE_ID) -->
<img class="logo" src="https://drive.google.com/thumbnail?id=YOUR_LOGO_ID&sz=w300">

<h2>Lado Women Foundation</h2>
<h3>Certificate Verification Portal</h3>

<input id="search" placeholder="Enter ID / Name / Certificate No">

<br>

<button onclick="verify()">Verify</button>

<div id="result"></div>

<h3>Internship Activities</h3>
<div class="gallery" id="gallery"></div>

</div>

</div>

<script>

/* 🔥 YOUR FINAL APPS SCRIPT API */
const API = "https://script.google.com/macros/s/AKfycbyCjE9AAdug8OHXLoYucXt5SrPc1Xl0gObtYlDBOqt_ySJAiXU34yc2Q-etjziPnEK1/exec";

/* 🔥 GOOGLE DRIVE IMAGES (replace FILE_IDs) */
const images = [
"https://drive.google.com/thumbnail?id=FILE_ID_1&sz=w1000",
"https://drive.google.com/thumbnail?id=FILE_ID_2&sz=w1000",
"https://drive.google.com/thumbnail?id=FILE_ID_3&sz=w1000",
"https://drive.google.com/thumbnail?id=FILE_ID_4&sz=w1000"
];

/* LOAD GALLERY */
let gallery = document.getElementById("gallery");

images.forEach(img=>{
let im = document.createElement("img");
im.src = img;
gallery.appendChild(im);
});

function verify(){

let search = document.getElementById("search").value.trim();

if(!search){
document.getElementById("result").innerHTML="Enter value";
return;
}

document.getElementById("result").innerHTML="Checking...";

fetch(API + "?search=" + encodeURIComponent(search))
.then(res=>res.json())
.then(data=>{

if(data.status=="found"){

document.getElementById("result").innerHTML=`

<h3 style="color:green;">✔️ Verified Certificate</h3>

<p><b>Name:</b> ${data.studentName}</p>
<p><b>Internship ID:</b> ${data.internshipId}</p>
<p><b>Father:</b> ${data.fatherName}</p>
<p><b>College:</b> ${data.college}</p>
<p><b>Certificate No:</b> ${data.certificateNo}</p>
<p><b>Duration:</b> ${data.duration}</p>
<p><b>Status:</b> ${data.verifyStatus}</p>

<button onclick="downloadCert()">Download Certificate</button>

`;

}else{

document.getElementById("result").innerHTML=
"<h3 style='color:red;'>❌ Not Found</h3>";

}

});

}

/* DOWNLOAD */
function downloadCert(){

let text = document.getElementById("result").innerText;

let blob = new Blob([text], {type:"text/plain"});
let a = document.createElement("a");

a.href = URL.createObjectURL(blob);
a.download = "LWF_Certificate.txt";
a.click();

}

</script>

</body>
</html>
