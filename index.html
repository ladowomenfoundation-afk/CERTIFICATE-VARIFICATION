<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lado Women Foundation - Internship Certificate Verification</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

.header{
    background:#0b3d91;
    color:#fff;
    text-align:center;
    padding:20px;
}

.container{
    max-width:800px;
    margin:30px auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#198754;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#157347;
}

.result{
    margin-top:20px;
}

.card{
    border:1px solid #ddd;
    border-radius:8px;
    padding:15px;
    background:#fafafa;
}

.success{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    font-weight:bold;
}

.row{
    margin:8px 0;
}
</style>
</head>
<body>

<div class="header">
    <h2>Lado Women Foundation</h2>
    <p>Internship Certificate Verification System</p>
</div>

<div class="container">

    <input
        type="text"
        id="searchInput"
        placeholder="Enter Internship ID / Student Name / Certificate ID"
    >

    <button onclick="verifyCertificate()">
        Verify Certificate
    </button>

    <div id="result" class="result"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzi2xOyd7OXiAEx8ZFeRgdGuKp_cykUrj7n84pujLRgZiO7YdZbZ_StIB04Qn0ecjWvTQ/exec";

async function verifyCertificate(){

    const searchValue =
        document.getElementById("searchInput").value.trim();

    const result =
        document.getElementById("result");

    if(!searchValue){
        result.innerHTML =
            "<p class='error'>Please enter a value.</p>";
        return;
    }

    result.innerHTML = "Checking...";

    try{

        const response = await fetch(
            API_URL +
            "?search=" +
            encodeURIComponent(searchValue)
        );

        const json = await response.json();

        if(json.status === "found" && json.data){

            const d = json.data;

            result.innerHTML = `
            <div class="card">

                <h3 class="success">
                    ✅ Certificate Verified
                </h3>

                <div class="row"><b>Student Name:</b> ${d.studentName || "-"}</div>

                <div class="row"><b>Internship ID:</b> ${d.internshipId || "-"}</div>

                <div class="row"><b>Father Name:</b> ${d.fatherName || "-"}</div>

                <div class="row"><b>College:</b> ${d.college || "-"}</div>

                <div class="row"><b>Roll No:</b> ${d.rollNo || "-"}</div>

                <div class="row"><b>Class:</b> ${d.class || "-"}</div>

                <div class="row"><b>Semester:</b> ${d.semester || "-"}</div>

                <div class="row"><b>Duration:</b> ${d.duration || "-"}</div>

                <div class="row"><b>Certificate No:</b> ${d.certificateNo || "-"}</div>

                <div class="row"><b>Issue Date:</b> ${d.issueDate || "-"}</div>

                <div class="row"><b>Status:</b> ${d.status || "-"}</div>

            </div>
            `;

        }else{

            result.innerHTML =
            "<p class='error'>❌ Record Not Found</p>";

        }

    }catch(error){

        console.error(error);

        result.innerHTML =
        "<p class='error'>Server Error</p>";

    }

}
</script>

</body>
</html>
