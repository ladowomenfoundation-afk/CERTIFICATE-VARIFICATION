<!DOCTYPE html>
<html>
<head>
  <title>Certificate Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family: Arial;
      margin:0;
      background:#f4f6f8;
    }

    .header{
      background:green;
      color:white;
      padding:15px;
      text-align:center;
      font-size:20px;
      font-weight:bold;
    }

    .box{
      max-width:600px;
      margin:auto;
      padding:20px;
    }

    input{
      width:90%;
      padding:12px;
      margin-top:10px;
      border:1px solid #ccc;
      border-radius:6px;
    }

    button{
      margin-top:10px;
      padding:10px 15px;
      background:green;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    #result{
      margin-top:20px;
      text-align:left;
      line-height:1.8;
    }

    .ok{color:green;font-weight:bold;font-size:18px;}
    .bad{color:red;font-weight:bold;font-size:18px;}

    .card{
      background:white;
      padding:15px;
      margin-top:15px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="header">Certificate Verification Portal</div>

<div class="box">

  <h3>Verify Certificate</h3>

  <input id="search" placeholder="Enter ID / Name / Roll No / Certificate No">

  <button onclick="verify()">VERIFY</button>

  <div id="result"></div>

</div>

<script>

function verify(){

  let value = document.getElementById("search").value;

  document.getElementById("result").innerHTML = "Checking...";

  fetch("https://script.google.com/macros/s/AKfycbzi2xOyd7OXiAEx8ZFeRgdGuKp_cykUrj7n84pujLRgZiO7YdZbZ_StIB04Qn0ecjWvTQ/exec?search=" + encodeURIComponent(value))

  .then(res => res.json())
  .then(res => {

    if(res.status === "found"){

      let d = res.data;

      document.getElementById("result").innerHTML =
        "<div class='ok'>✔️ VERIFIED CERTIFICATE</div>" +
        "<div class='card'>" +
        "<b>Internship ID:</b> " + d.internshipId + "<br>" +
        "<b>Student Name:</b> " + d.studentName + "<br>" +
        "<b>Father Name:</b> " + d.fatherName + "<br>" +
        "<b>College:</b> " + d.college + "<br>" +
        "<b>Roll No:</b> " + d.rollNo + "<br>" +
        "<b>Class:</b> " + d.class + "<br>" +
        "<b>Semester:</b> " + d.semester + "<br>" +
        "<b>Duration:</b> " + d.duration + "<br>" +
        "<b>Certificate No:</b> " + d.certificateNo + "<br>" +
        "<b>Issue Date:</b> " + d.issueDate + "<br>" +
        "<b>Status:</b> " + d.status +
        "</div>";

    } else {
      document.getElementById("result").innerHTML =
        "<div class='bad'>❌ NOT FOUND</div>";
    }

  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "<div class='bad'>SERVER ERROR</div>";
  });

}

</script>

</body>
</html>
