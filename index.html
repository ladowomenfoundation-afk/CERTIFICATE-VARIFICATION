<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Internship Verification</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

.header{
    background:#0b3d91;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:850px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:green;
    color:white;
    border:none;
    border-radius:6px;
}

.card{
    margin-top:20px;
    padding:20px;
    border:1px solid #ddd;
    border-radius:10px;
}

.row{
    margin:6px 0;
}

.success{color:green;font-weight:bold;}
.error{color:red;font-weight:bold;}

.badge{
    padding:4px 8px;
    border-radius:5px;
    color:white;
    font-size:12px;
}

.green{background:green;}
</style>
</head>

<body>

<div class="header">
    <h2>Lado Women Foundation</h2>
    <p>Internship Verification Portal</p>
</div>

<div class="container">

<input type="text" id="search" placeholder="Enter ID / Name / Certificate No">
<button onclick="verify()">Verify</button>

<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzi2xOyd7OXiAEx8ZFeRgdGuKp_cykUrj7n84pujLRgZiO7YdZbZ_StIB04Qn0ecjWvTQ/exec";

function safe(v){
    return (v === null || v === undefined || v === "") ? "-" : v;
}

async function verify(){

    let search = document.getElementById("search").value.trim();
    let result = document.getElementById("result");

    if(!search){
        result.innerHTML = "<p class='error'>Enter value</p>";
        return;
    }

    result.innerHTML = "Checking...";

    try{

        const res = await fetch(API_URL + "?search=" + encodeURIComponent(search));
        const json = await res.json();

        // 🔥 FIX: both conditions supported
        if(json.status === "found" && json.data){

            let d = json.data;

            result.innerHTML = `
            <div class="card">

                <div class="success">✅ Certificate Verified</div>

                <div class="row"><b>Student Name:</b> ${safe(d["Student Name"])}</div>
                <div class="row"><b>Internship ID:</b> ${safe(d["Internship ID"])}</div>
                <div class="row"><b>Father Name:</b> ${safe(d["Father Name"])}</div>
                <div class="row"><b>College:</b> ${safe(d["College"])}</div>
                <div class="row"><b>Roll No:</b> ${safe(d["Roll No"])}</div>
                <div class="row"><b>Class:</b> ${safe(d["Class"])}</div>
                <div class="row"><b>Semester:</b> ${safe(d["Semester"])}</div>
                <div class="row"><b>Duration:</b> ${safe(d["Duration"])}</div>
                <div class="row"><b>Certificate No:</b> ${safe(d["Certificate No"])}</div>
                <div class="row"><b>Issue Date:</b> ${safe(d["Issue Date"])}</div>

                <div class="row">
                    <b>Status:</b>
                    <span class="badge green">${safe(d["Status"])}</span>
                </div>

                <div class="row"><b>Organisation:</b> ${safe(d["Organisation"])}</div>

            </div>
            `;

        } else {
            result.innerHTML = "<p class='error'>❌ Not Found</p>";
        }

    } catch(e){
        console.log(e);
        result.innerHTML = "<p class='error'>Server Error</p>";
    }
}

</script>

</body>
</html>
