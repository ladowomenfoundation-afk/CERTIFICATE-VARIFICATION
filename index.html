<script>

const API_URL = "YOUR_API_URL_HERE";

// ================= SEARCH =================
function searchVerify(){

  let input = document.getElementById("searchInput").value.toLowerCase();
  let result = document.getElementById("result");

  if(!input){
    result.innerHTML = "Please enter value";
    return;
  }

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    // 🔥 SAFE CHECK (ARRAY OR OBJECT)
    let list = Array.isArray(data) ? data : [data];

    let match = list.find(item =>
      (item.studentName || "").toLowerCase() === input ||
      (item.internshipId || "").toLowerCase() === input ||
      (item.certificateNo || "").toLowerCase() === input
    );

    showResult(match, result);

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "Server Error / API Not Responding";
  });
}

// ================= DIRECT VERIFY =================
function directVerify(){

  let id = document.getElementById("idInput").value.toLowerCase();
  let result = document.getElementById("result");

  if(!id){
    result.innerHTML = "Please enter Internship ID";
    return;
  }

  fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    let list = Array.isArray(data) ? data : [data];

    let match = list.find(item =>
      (item.internshipId || "").toLowerCase() === id
    );

    showResult(match, result);

  })
  .catch(err => {
    console.log(err);
    result.innerHTML = "Server Error";
  });
}

// ================= RESULT =================
function showResult(match, result){

  if(!match){
    result.innerHTML = "<h3 style='color:red;'>❌ Not Found</h3>";
    return;
  }

  result.innerHTML = `
    <h3 style="color:green;">✔️ Verified Successfully</h3>

    <p><b>Name:</b> ${match.studentName || "-"}</p>
    <p><b>Internship ID:</b> ${match.internshipId || "-"}</p>
    <p><b>Father Name:</b> ${match.fatherName || "-"}</p>
    <p><b>College:</b> ${match.college || "-"}</p>
    <p><b>Roll No:</b> ${match.rollNo || "-"}</p>
    <p><b>Class:</b> ${match.class || "-"}</p>
    <p><b>Semester:</b> ${match.semester || "-"}</p>
    <p><b>Duration:</b> ${match.duration || "-"}</p>
    <p><b>Certificate No:</b> ${match.certificateNo || "-"}</p>
    <p><b>Issue Date:</b> ${match.issueDate || "-"}</p>
    <p><b>Status:</b> ${match.status || "-"}</p>
  `;
}

</script>
